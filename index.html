<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grace — Official Soundtrack</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

  :root {
    --bg: #070709;
    --surface: #0e0e12;
    --border: #1e1e28;
    --accent: #c8ff00;
    --accent2: #00d4ff;
    --text: #e8e8f0;
    --muted: #5a5a70;
    --danger: #ff3860;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,255,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,255,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Ambient glow */
  .glow-orb {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,255,0,0.04) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: pulse-orb 4s ease-in-out infinite;
  }

  @keyframes pulse-orb {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
  }

  .card {
    position: relative;
    width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 48px;
    z-index: 10;
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
  }

  .card::before {
    content: '';
    position: absolute;
    top: -1px; right: -1px; bottom: -1px; left: -1px;
    background: linear-gradient(135deg, var(--accent) 0%, transparent 40%, transparent 60%, var(--accent2) 100%);
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
    z-index: -1;
    opacity: 0.4;
  }

  .tag {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.8;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    line-height: 0.95;
    letter-spacing: 0.02em;
    color: var(--text);
    margin-bottom: 4px;
  }

  h1 span {
    color: var(--accent);
    display: block;
  }

  .subtitle {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 32px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }

  .track-name {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    padding: 12px 16px;
    background: linear-gradient(90deg, rgba(200,255,0,0.06) 0%, transparent 100%);
    border-left: 2px solid var(--accent);
    position: relative;
    overflow: hidden;
  }

  .track-name::after {
    content: 'TRACK 01';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 8px;
    letter-spacing: 0.3em;
    color: var(--muted);
  }

  .track-icon {
    color: var(--accent);
    font-size: 12px;
    opacity: 0.7;
    animation: blink 2s ease-in-out infinite;
  }

  .track-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.12em;
    color: var(--text);
    text-shadow: 0 0 16px rgba(200,255,0,0.25);
  }

  .meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 36px;
  }

  .meta-item {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    padding: 12px 16px;
  }

  .meta-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .meta-value {
    font-size: 13px;
    color: var(--text);
    font-weight: 700;
  }

  /* ─── DOWNLOAD BUTTON ─── */
  #dl-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 18px 24px;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
    transition: filter 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  #dl-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }

  #dl-btn:hover::after { transform: translateX(100%); }
  #dl-btn:hover { filter: brightness(1.15); }
  #dl-btn:active { transform: scale(0.99); }

  .btn-icon {
    font-size: 18px;
    line-height: 1;
  }

  /* ─── LOADER ─── */
  #loader {
    display: none;
    width: 100%;
  }

  #loader.active { display: block; }
  #dl-btn.hidden { display: none; }

  .loader-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .loader-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .loader-pct {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent);
    line-height: 1;
  }

  .progress-track {
    width: 100%;
    height: 3px;
    background: var(--border);
    position: relative;
    margin-bottom: 20px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    width: 0%;
    transition: width 0.3s ease;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
  }

  .loader-log {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
    line-height: 1.8;
    height: 54px;
    overflow: hidden;
    position: relative;
  }

  .dl-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    margin-bottom: 14px;
    border: 1px solid var(--border);
  }

  .stat-item {
    padding: 10px 12px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .stat-item:last-child { border-right: none; }

  .stat-label {
    font-size: 8px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    color: var(--accent2);
    letter-spacing: 0.05em;
    line-height: 1;
    transition: color 0.15s;
  }

  .stat-value.flash { color: var(--accent); }

  .log-line {
    opacity: 0;
    transform: translateY(4px);
    animation: log-in 0.3s forwards;
  }

  .log-line.ok { color: var(--accent); }
  .log-line.warn { color: var(--accent2); }

  @keyframes log-in {
    to { opacity: 1; transform: translateY(0); }
  }

  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 28px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .wave-bar {
    flex: 1;
    background: var(--accent);
    border-radius: 1px;
    animation: wave-anim var(--d, 0.6s) ease-in-out infinite alternate;
    opacity: 0.6;
  }

  @keyframes wave-anim {
    from { height: 4px; }
    to { height: var(--h, 20px); }
  }

  /* ─── COMPLETE STATE ─── */
  #complete-btn {
    display: none;
    width: 100%;
    padding: 0;
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: none;
    position: relative;
  }

  #complete-btn.show {
    display: block;
    animation: appear 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .complete-inner {
    position: relative;
    width: 100%;
    padding: 22px 28px;
    background: linear-gradient(135deg, #0a0a0f 0%, #111118 100%);
    border: 1px solid rgba(200,255,0,0.3);
    display: flex;
    align-items: center;
    justify-content: space-between;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  #complete-btn:hover .complete-inner {
    border-color: rgba(200,255,0,0.8);
  }

  /* shimmer sweep */
  .complete-inner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg,
      transparent 30%,
      rgba(200,255,0,0.07) 50%,
      transparent 70%
    );
    transform: translateX(-100%);
    animation: shimmer 2.5s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%   { transform: translateX(-100%); }
    60%, 100% { transform: translateX(100%); }
  }

  /* top glow line */
  .complete-inner::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: glow-scan 2.5s ease-in-out infinite;
  }

  @keyframes glow-scan {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  .complete-left {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
  }

  .complete-ready {
    font-size: 9px;
    letter-spacing: 0.35em;
    color: var(--accent);
    text-transform: uppercase;
    opacity: 0.7;
  }

  .complete-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: #fff;
    letter-spacing: 0.08em;
    line-height: 1;
    text-shadow: 0 0 20px rgba(200,255,0,0.4);
  }

  .complete-right {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 48px;
    border: 1px solid rgba(200,255,0,0.4);
    border-radius: 50%;
    position: relative;
    flex-shrink: 0;
  }

  .complete-right::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1px solid rgba(200,255,0,0.15);
    animation: ring-pulse 2s ease-in-out infinite;
  }

  @keyframes ring-pulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.15); opacity: 0; }
  }

  .complete-arrow {
    font-size: 20px;
    color: var(--accent);
    line-height: 1;
    animation: bounce-down 1.5s ease-in-out infinite;
  }

  @keyframes bounce-down {
    0%, 100% { transform: translateY(-2px); }
    50% { transform: translateY(3px); }
  }

  @keyframes appear {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 8px;
    box-shadow: 0 0 8px var(--accent);
    animation: blink 1s ease-in-out infinite;
  }

  /* ─── THANK YOU ─── */
  #thankyou {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: 24px;
    opacity: 0;
  }

  #thankyou.show {
    display: flex;
    animation: ty-appear 1s ease 0.3s forwards;
  }

  @keyframes ty-appear {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .ty-line {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,255,0,0.3), transparent);
  }

  .ty-text {
    display: flex;
    gap: 1px;
    letter-spacing: 0.18em;
  }

  .ty-char {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--muted);
    opacity: 0;
    animation: char-in 0.4s ease forwards;
    text-shadow: 0 0 12px rgba(200,255,0,0);
    transition: color 0.3s, text-shadow 0.3s;
  }

  .ty-char:hover {
    color: var(--accent);
    text-shadow: 0 0 16px rgba(200,255,0,0.6);
  }

  @keyframes char-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="glow-orb"></div>

<div class="card">
  <p class="tag">// Official Soundtrack</p>
  <h1>GRACE<span>Official Soundtrack</span></h1>
  <p class="subtitle">Music by phill.C &nbsp;·&nbsp; オフィシャルサウンドトラック</p>

  <div class="track-name">
    <span class="track-icon">♪</span>
    <span class="track-title">ULTRASONIC FAITH</span>
  </div>

  <div class="meta">
    <div class="meta-item">
      <div class="meta-label">フォーマット</div>
      <div class="meta-value">MP3 / 320kbps</div>
    </div>
    <div class="meta-item">
      <div class="meta-label">カテゴリ</div>
      <div class="meta-value">OST / MUSIC</div>
    </div>
  </div>

  <button id="dl-btn" onclick="startLoading()">
    <span><span class="status-dot"></span>ダウンロード開始</span>
    <span class="btn-icon">↓</span>
  </button>

  <div id="loader">
    <div class="loader-header">
      <span class="loader-label">// 転送中...</span>
      <span class="loader-pct" id="pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="fill"></div>
    </div>
    <div class="dl-stats">
      <div class="stat-item">
        <span class="stat-label">転送速度</span>
        <span class="stat-value" id="speed">0.00 MB/s</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">転送済み</span>
        <span class="stat-value" id="transferred">0.00 / 8.34 MB</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">残り時間</span>
        <span class="stat-value" id="eta">--:--</span>
      </div>
    </div>
    <div class="waveform" id="waveform"></div>
  </div>

  <a id="complete-btn" href="ULTRASONIC FAITH - Grace OST.mp3" download="ULTRASONIC FAITH - Grace OST.mp3">
    <div class="complete-inner">
      <div class="complete-left">
        <span class="complete-ready">// 準備完了</span>
        <span class="complete-label">DOWNLOAD</span>
      </div>
      <div class="complete-right">
        <span class="complete-arrow">↓</span>
      </div>
    </div>
  </a>

  <div id="thankyou">
    <div class="ty-line"></div>
    <p class="ty-text">
      <span class="ty-char">ご</span><span class="ty-char">利</span><span class="ty-char">用</span><span class="ty-char">あ</span><span class="ty-char">り</span><span class="ty-char">が</span><span class="ty-char">と</span><span class="ty-char">う</span><span class="ty-char">ご</span><span class="ty-char">ざ</span><span class="ty-char">い</span><span class="ty-char">ま</span><span class="ty-char">す</span>
    </p>
    <div class="ty-line"></div>
  </div>
</div>

<script>
const TOTAL_MB = 5.74;
const DURATION = 20000;

function buildWaveform() {
  const wf = document.getElementById('waveform');
  for (let i = 0; i < 40; i++) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    const h = Math.random() * 20 + 4;
    const d = (Math.random() * 0.5 + 0.3).toFixed(2);
    bar.style.setProperty('--h', h + 'px');
    bar.style.setProperty('--d', d + 's');
    bar.style.animationDelay = (Math.random() * 0.5) + 's';
    wf.appendChild(bar);
  }
}

function flash(el) {
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 150);
}

function formatEta(seconds) {
  if (seconds <= 0 || !isFinite(seconds)) return '--:--';
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function startLoading() {
  document.getElementById('dl-btn').classList.add('hidden');
  document.getElementById('loader').classList.add('active');
  buildWaveform();

  const fill = document.getElementById('fill');
  const pct  = document.getElementById('pct');
  const speedEl       = document.getElementById('speed');
  const transferredEl = document.getElementById('transferred');
  const etaEl         = document.getElementById('eta');

  // Base speed curve: slow → fast → slow (MB/s over 0-1 progress)
  // We simulate ~0.4 MB/s avg to cover 8.34 MB in 20s
  let startTime = null;
  let prevTimestamp = null;
  let downloadedMB = 0;
  let smoothSpeed = 0;
  // noise state
  let noiseTarget = 0.42;
  let noiseCurrent = 0.10;
  let noiseTimer = 0;

  function easeInOutSine(t) {
    return -(Math.cos(Math.PI * t) - 1) / 2;
  }

  function animateProgress(timestamp) {
    if (!startTime) { startTime = timestamp; prevTimestamp = timestamp; }
    const elapsed = timestamp - startTime;
    const raw = Math.min(elapsed / DURATION, 1);

    // dt in seconds
    const dt = (timestamp - prevTimestamp) / 1000;
    prevTimestamp = timestamp;

    // Speed varies realistically: ramp up early, plateau, slight slow at end
    // Base speed profile shaped by curve
    const speedCurve =
      raw < 0.1 ? raw / 0.1 * 0.6 :          // ramp up 0→0.6 MB/s
      raw < 0.7 ? 0.6 - (raw - 0.1) * 0.15 : // slight drift
      0.6 - (raw - 0.7) * 1.5;                // slow finish

    // Noise: random fluctuation every ~1.5s
    noiseTimer -= dt;
    if (noiseTimer <= 0) {
      noiseTarget = speedCurve * (0.75 + Math.random() * 0.5);
      noiseTimer = 0.8 + Math.random() * 1.2;
    }
    noiseCurrent += (noiseTarget - noiseCurrent) * Math.min(dt * 3, 1);

    // Occasionally spike or dip
    const spikeFactor = Math.random() < 0.02 ? (Math.random() < 0.5 ? 1.8 : 0.3) : 1;
    const currentSpeed = Math.max(0.01, noiseCurrent * spikeFactor);
    smoothSpeed += (currentSpeed - smoothSpeed) * 0.3;

    downloadedMB = Math.min(easeInOutSine(raw) * TOTAL_MB, TOTAL_MB);
    const percent = Math.floor(downloadedMB / TOTAL_MB * 100);

    fill.style.width = percent + '%';
    pct.textContent  = percent + '%';

    // Speed display with occasional micro-jitter
    const displaySpeed = smoothSpeed + (Math.random() - 0.5) * 0.04;
    speedEl.textContent = displaySpeed.toFixed(2) + ' MB/s';
    flash(speedEl);

    // Transferred
    transferredEl.textContent =
      downloadedMB.toFixed(2) + ' / ' + TOTAL_MB.toFixed(2) + ' MB';

    // ETA
    const remaining = TOTAL_MB - downloadedMB;
    const etaSec = smoothSpeed > 0 ? remaining / smoothSpeed : 99;
    etaEl.textContent = formatEta(etaSec);

    if (raw < 1) {
      requestAnimationFrame(animateProgress);
    } else {
      speedEl.textContent = '0.00 MB/s';
      etaEl.textContent = '00:00';
      transferredEl.textContent = TOTAL_MB.toFixed(2) + ' / ' + TOTAL_MB.toFixed(2) + ' MB';
      pct.textContent = '100%';
      fill.style.width = '100%';
    }
  }

  requestAnimationFrame(animateProgress);

  // Complete
  setTimeout(() => {
    document.getElementById('loader').classList.remove('active');
    document.getElementById('complete-btn').classList.add('show');

    // Thank you — staggered char animation
    const ty = document.getElementById('thankyou');
    ty.classList.add('show');
    ty.querySelectorAll('.ty-char').forEach((el, i) => {
      el.style.animationDelay = (0.4 + i * 0.07) + 's';
    });
  }, DURATION + 2300);
}
</script>
</body>
</html>
